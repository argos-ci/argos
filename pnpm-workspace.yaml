packages:
  - apps/*
  - packages/*
  - infra

blockExoticSubdeps: true

catalog:
  '@types/express': ^5.0.6
  '@types/node': ^24.12.4
  '@types/react': ^19.2.15
  '@types/react-dom': ^19.2.3
  eslint: ^10.4.0
  express: ^5.2.1
  lodash-es: ^4.18.1
  minimatch: ^10.2.5
  react: ^19.2.6
  react-dom: ^19.2.6
  undici: 8.3.0
  zod: ^4.4.3

overrides:
  "@types/express": "catalog:"
  "@types/express-serve-static-core": ^5.0.7
  "@types/node": "catalog:"
  dompurify: ^3.4.0
  express: "catalog:"
  file-type: ^21.3.2
  ip-address: ^10.1.1
  lodash: ^4.17.23
  lodash-es: "catalog:"
  minimatch: "catalog:"
  react: "catalog:"
  react-dom: "catalog:"
  uuid: ^14.0.0
  undici: "catalog:"
  ws: ^8.20.1

allowBuilds:
  "@apollo/protobufjs": true
  "@parcel/watcher": true
  "@sentry/cli": true
  "@swc/core": true
  "@tailwindcss/oxide": true
  esbuild: true
  msw: true
  odiff-bin: true
  oxc-resolver: true
  sharp: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@argos-ci/*"

name: CI
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup Node.js & install dependencies
        uses: ./.github/actions/setup-deps

      - name: Build
        run: pnpm exec -- turbo run build --filter=\!@argos/frontend

      - name: Run static checks
        run: pnpm exec -- turbo run static-checks

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      TZ: utc
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup Node.js & install dependencies
        uses: ./.github/actions/setup-deps

      - name: Build
        run: pnpm exec -- turbo run build --filter=\!@argos/frontend

      - name: Run unit tests
        run: pnpm run test:unit

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env:
      NODE_ENV: test
      TZ: utc
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    services:
      redis:
        image: redis:6-alpine
        ports:
          - 6380:6379
        # Speed up initialization by disabling health checks
        # Services run during the installation of the dependencies
        # options: >-
        #   --health-cmd "redis-cli ping"
        #   --health-interval 10s
        #   --health-timeout 5s
        #   --health-retries 5

      postgres:
        image: postgres:17-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        # Speed up initialization by disabling health checks
        # Services run during the installation of the dependencies
        # options: >-
        #   --health-cmd "pg_isready"
        #   --health-interval 10s
        #   --health-timeout 5s
        #   --health-retries 5

      rabbit:
        image: rabbitmq:4-alpine
        ports:
          - 5672:5672
        # Speed up initialization by disabling health checks
        # Services run during the installation of the dependencies
        # options: >-
        #   --health-cmd "rabbitmq-diagnostics -q ping"
        #   --health-interval 10s
        #   --health-timeout 5s
        #   --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup Node.js & install dependencies
        uses: ./.github/actions/setup-deps

      - name: Setup
        run: pnpm run setup
        env:
          BUILD_MODE: production

      - name: Test
        run: pnpm run test:integration --shard=${{ matrix.shard }}/2

  test-gate:
    name: test
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: ${{ always() }}

    steps:
      - name: Fail if any test job failed or was cancelled
        run: |
          if [ "${{ needs.unit-test.result }}" != "success" ] || \
             [ "${{ needs.integration-test.result }}" != "success" ]; then
            echo "At least one test job did not succeed"
            exit 1
          fi

name: Release
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  AWS_REGION: us-east-1
  ECR_REPOSITORY: argos/app
  ECR_CACHE_TAG: buildcache

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest
          #   type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.ECR_CACHE_TAG }}
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.ECR_CACHE_TAG }},mode=max
          build-args: |
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: aws/tasks/argos-app.json
          container-name: argos-app
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          environment-variables: |
            NODE_ENV=production
          secrets: |
            DISCORD_WEBHOOK_URL=parameter/production/discord_webhook_url
            GITHUB_APP_ID=parameter/production/github_app_id
            GITHUB_APP_PRIVATE_KEY=parameter/production/github_app_private_key
            GITHUB_APP_URL=parameter/production/github_app_url
            GITHUB_CLIENT_ID=parameter/production/github_client_id
            GITHUB_CLIENT_SECRET=parameter/production/github_client_secret
            GITHUB_LIGHT_APP_ID=parameter/production/github_light_app_id
            GITHUB_LIGHT_APP_PRIVATE_KEY=parameter/production/github_light_app_private_key
            GITHUB_LIGHT_APP_URL=parameter/production/github_light_app_url
            GITHUB_LIGHT_WEBHOOK_SECRET=parameter/production/github_light_webhook_secret
            GITHUB_PROXY_URL=parameter/production/github_proxy_url
            GITHUB_SSO_STRIPE_PRODUCT_ID=parameter/production/github_sso_stripe_product_id
            GITHUB_WEBHOOK_SECRET=parameter/production/github_webhook_secret
            GITLAB_APP_ID=parameter/production/gitlab_app_id
            GITLAB_APP_SECRET=parameter/production/gitlab_app_secret
            GITLAB_ARGOS_AUTH_SECRET=parameter/production/gitlab_argos_auth_secret
            GOOGLE_CLIENT_ID=parameter/production/google_client_id
            GOOGLE_CLIENT_SECRET=parameter/production/google_client_secret
            REDIS_URL=parameter/production/redis_url
            RESEND_API_KEY=parameter/production/resend_api_key
            RESEND_WEBHOOK_SECRET=parameter/production/resend_webhook_secret
            SCREENSHOT_STRIPE_PRODUCT_ID=parameter/production/screenshot_stripe_product_id
            SENTRY_AUTH_TOKEN=parameter/production/sentry_auth_token
            SENTRY_CLIENT_DSN=parameter/production/sentry_client_dsn
            SENTRY_SERVER_DSN=parameter/production/sentry_server_dsn
            SERVER_SESSION_SECRET=parameter/production/server_session_secret
            SLACK_CLIENT_ID=parameter/production/slack_client_id
            SLACK_CLIENT_SECRET=parameter/production/slack_client_secret
            SLACK_SIGNING_SECRET=parameter/production/slack_signing_secret
            SLACK_STATE_SECRET=parameter/production/slack_state_secret
            SQIDS_ALPHABET=parameter/production/sqids_alphabet
            STORYBOOK_SCREENSHOT_STRIPE_PRODUCT_ID=parameter/production/storybook_screenshot_stripe_product_id
            STRIPE_API_KEY=parameter/production/stripe_api_key
            STRIPE_WEBHOOK_SECRET=parameter/production/stripe_webhook_secret

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: argos-app
          cluster: argos-production
          wait-for-service-stability: true
